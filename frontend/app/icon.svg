<svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
  <defs>
    <radialGradient id="aura-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.6" />
      <stop offset="60%" stop-color="#b91c1c" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#fca5a5" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="well-depth" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#ef4444" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="crystal-facets" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="40%" stop-color="#fca5a5" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.8" />
    </linearGradient>
    <filter id="soft-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#aura-glow)" filter="url(#soft-blur)" opacity="0.8" />
  <circle cx="50" cy="50" r="32" fill="url(#well-depth)" opacity="0.9" />
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" stroke-dasharray="40 80" stroke-linecap="round" />
  <circle cx="50" cy="50" r="25" fill="none" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" stroke-dasharray="20 40" stroke-linecap="round" />
  <path d="M 50 28 L 62 50 L 50 72 L 38 50 Z" fill="url(#crystal-facets)" opacity="0.9" />
  <circle cx="50" cy="50" r="4" fill="#ffffff" filter="url(#soft-blur)" opacity="0.9" />
</svg>
